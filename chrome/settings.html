<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      max-width: 420px;
      background: #fff;
      color: #111;
    }

    label {
      display: block;
      margin-top: 12px;
      font-size: 13px;
      font-weight: bold;
    }
    label small { font-weight: normal; color: #888; }

    input[type="text"],
    input[type="password"],
    select {
      width: 100%;
      box-sizing: border-box;
      padding: 7px;
      margin-top: 4px;
      font-size: 13px;
      background: #fff;
      color: #111;
      border: 1px solid #ccc;
      border-radius: 3px;
    }

    .checkbox-label {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: normal;
      margin-top: 12px;
      cursor: pointer;
    }
    .checkbox-label input { width: auto; margin: 0; }

    button {
      padding: 6px 12px;
      font-size: 13px;
      cursor: pointer;
      border: 1px solid #ccc;
      border-radius: 3px;
      background: #f0f0f0;
    }
    button:hover { background: #e0e0e0; }
    #saveBtn { margin-top: 14px; padding: 8px 18px; }

    #msg          { margin-top: 10px; font-size: 13px; }
    #fetchStatus  { font-size: 11px; color: #888; margin-top: 4px; }
    .hint         { font-size: 11px; color: #888; margin-top: 4px; }

    hr { border: none; border-top: 1px solid #ddd; margin: 16px 0 4px; }

    #activityTypeSection {
      display: none;
      margin-top: 10px;
    }
    .fetch-row {
      display: flex;
      gap: 6px;
      align-items: center;
    }
    .fetch-row select { flex: 1; margin-top: 0; }

    /* Dark mode */
    body.dark                    { background: #1e1e1e; color: #e0e0e0; }
    body.dark input[type="text"],
    body.dark input[type="password"],
    body.dark select             { background: #2a2a2a; color: #e0e0e0; border-color: #555; }
    body.dark button             { background: #333; color: #e0e0e0; border-color: #555; }
    body.dark button:hover       { background: #444; }
    body.dark hr                 { border-color: #444; }
  </style>
</head>
<body>
  <h2>Zammad Settings</h2>

  <label>Base URL <small>(no trailing slash)</small></label>
  <input id="url" type="text" placeholder="https://support.example.com">

  <label>API Token</label>
  <input id="token" type="password" placeholder="Your Zammad API token">

  <label>Note Signature <small>(appended to every note)</small></label>
  <input id="signature" type="text" placeholder="e.g. Logged via Zammad Browser Extension">

  <label class="checkbox-label">
    <input id="includeTime" type="checkbox">
    Include submitted time in note body
  </label>

  <hr>

  <label class="checkbox-label">
    <input id="darkMode" type="checkbox">
    Dark mode
  </label>

  <hr>

  <label class="checkbox-label">
    <input id="activityTypeEnabled" type="checkbox">
    Enable Activity Type on submission
  </label>

  <div id="activityTypeSection">
    <div class="fetch-row">
      <select id="activityTypeSelect">
        <option value="">-- click Fetch --</option>
      </select>
      <button id="fetchTypesBtn" type="button">Fetch Types</button>
    </div>
    <div id="fetchStatus"></div>
    <p class="hint">
      Types must be enabled and established. Find them at:<br>
      <strong>Admin &rarr; Time Accounting &rarr; Activity Types</strong>.
    </p>
  </div>

  <button id="saveBtn">Save</button>
  <div id="msg"></div>

  <script src="settings.js"></script>
</body>
</html>
